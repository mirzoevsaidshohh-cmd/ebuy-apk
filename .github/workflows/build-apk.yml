name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare www
        run: |
          mkdir -p www
          ZIP_FILE=$(ls *.zip | head -n 1)
          unzip -o "$ZIP_FILE" -d temp_app
          INDEX_PATH=$(find temp_app -name "index.html" | head -n 1)
          APP_DIR=$(dirname "$INDEX_PATH")
          cp -r "$APP_DIR"/* www/
          ls -la www

      - name: Install dependencies
        run: npm install

      - name: Add Android
        run: npx cap add android

      - name: Sync
        run: npx cap sync android

      - name: Build APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: eBuy-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
