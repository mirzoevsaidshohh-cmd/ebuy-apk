name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Prepare www folder
        run: |
          rm -rf www temp_app android
          mkdir -p www temp_app

          ZIP_FILE=$(find . -maxdepth 1 -type f \( -iname "*.zip" -o -iname "*.ZIP" \) | head -n 1)

          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: ZIP file not found!"
            exit 1
          fi

          echo "ZIP FOUND: $ZIP_FILE"
          unzip -o "$ZIP_FILE" -d temp_app

          INDEX_PATH=$(find temp_app -iname "index.html" | head -n 1)

          if [ -z "$INDEX_PATH" ]; then
            echo "ERROR: index.html not found!"
            exit 1
          fi

          APP_DIR=$(dirname "$INDEX_PATH")
          cp -r "$APP_DIR"/* www/

          echo "WWW READY:"
          ls -la www

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: eBuy-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
